services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: deal_room_ai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d deal_room_ai"]
      interval: 5s
      timeout: 5s
      retries: 10

  chromadb:
    image: chromadb/chroma:0.5.20
    volumes:
      - chroma_data:/chroma/chroma
    ports:
      - "8001:8000"
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v2/heartbeat').read()"
      interval: 5s
      timeout: 5s
      retries: 15

  api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/deal_room_ai
      CHROMA_HOST: chromadb
      CHROMA_PORT: "8000"
      STORAGE_DIR: /app/storage
      # Silence the chromadb==0.5.20 client posthog log (call fails locally;
      # no data leaves the host). Server-side telemetry is disabled above.
      ANONYMIZED_TELEMETRY: "False"
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head &&
             uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - .:/app
      - ./storage:/app/storage

volumes:
  postgres_data:
  chroma_data:
